<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800">
  <defs>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="800" fill="#f0f0f1"/>

  <!-- WP Admin bar -->
  <rect width="1280" height="32" fill="#1d2327"/>
  <text x="12" y="21" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" fill="#a7aaad">&#9632; WordPress</text>
  <text x="120" y="21" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" fill="#a7aaad">My Site</text>
  <text x="210" y="21" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" fill="#a7aaad">+New</text>
  <text x="1180" y="21" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" fill="#a7aaad">Howdy, admin</text>

  <!-- WP Left menu -->
  <rect x="0" y="32" width="160" height="768" fill="#2c3338"/>
  <rect x="0" y="32" width="160" height="36" fill="#1d2327"/>
  <text x="20" y="56" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" fill="#f0f0f1">&#8962; Dashboard</text>
  <text x="20" y="100" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" fill="#a7aaad">&#128221; Posts</text>
  <text x="20" y="130" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" fill="#a7aaad">&#128247; Media</text>
  <text x="20" y="160" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" fill="#a7aaad">&#128196; Pages</text>
  <text x="20" y="190" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" fill="#a7aaad">&#128101; Users</text>
  <text x="20" y="220" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" fill="#a7aaad">&#9881; Settings</text>
  <!-- Active plugin menu item -->
  <rect x="0" y="235" width="160" height="36" fill="#6366f1"/>
  <text x="20" y="259" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" font-weight="600" fill="#ffffff">&#9993; Postwave</text>

  <!-- Main content area -->
  <rect x="160" y="32" width="1120" height="768" fill="#f0f0f1"/>

  <!-- Plugin header bar -->
  <rect x="160" y="32" width="1120" height="52" fill="#ffffff" stroke="#dcdcde" stroke-width="1"/>
  <!-- Logo -->
  <rect x="184" y="42" width="32" height="32" rx="8" fill="url(#logoGrad)"/>
  <text x="200" y="63" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">&#9993;</text>
  <text x="228" y="55" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="14" font-weight="700" fill="#1d2327">Postwave</text>
  <text x="228" y="71" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" fill="#646970">JMAP Mail for WordPress</text>
  <!-- Active status -->
  <rect x="1160" y="52" width="100" height="20" rx="10" fill="#edfaef"/>
  <circle cx="1172" cy="62" r="4" fill="#00a32a"/>
  <text x="1182" y="66" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#00a32a">Active</text>

  <!-- Tab navigation -->
  <rect x="160" y="84" width="1120" height="44" fill="#ffffff" stroke="#dcdcde" stroke-width="1"/>
  <!-- Tabs -->
  <text x="196" y="111" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" fill="#646970">General</text>
  <!-- Active Accounts tab -->
  <rect x="260" y="84" width="100" height="44" fill="#ffffff"/>
  <rect x="260" y="124" width="100" height="3" fill="#6366f1"/>
  <text x="310" y="111" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" font-weight="600" fill="#6366f1" text-anchor="middle">Accounts</text>
  <rect x="355" y="96" width="18" height="16" rx="8" fill="#6366f1"/>
  <text x="364" y="108" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">2</text>
  <text x="410" y="111" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" fill="#646970">Routing</text>
  <text x="490" y="111" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" fill="#646970">Connection</text>
  <text x="590" y="111" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" fill="#646970">Mail Log</text>

  <!-- Page header -->
  <rect x="160" y="128" width="1120" height="680" fill="#f0f0f1"/>
  <text x="196" y="168" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="20" font-weight="700" fill="#1d2327">Accounts</text>
  <text x="196" y="188" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" fill="#646970">Configure multiple JMAP accounts for routing.</text>

  <!-- Account cards grid -->

  <!-- Card 1: Primary -->
  <rect x="196" y="208" width="330" height="170" rx="4" fill="#ffffff" stroke="#dcdcde" stroke-width="1"/>
  <!-- Card header -->
  <rect x="196" y="208" width="330" height="48" rx="4" fill="#ffffff" stroke="#dcdcde" stroke-width="1"/>
  <circle cx="216" cy="232" r="6" fill="#00a32a"/>
  <text x="230" y="237" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="14" font-weight="700" fill="#1d2327">Primary</text>
  <rect x="295" y="222" width="52" height="20" rx="10" fill="#eef2ff"/>
  <text x="321" y="236" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" fill="#6366f1" text-anchor="middle">Primary</text>
  <!-- Server URL -->
  <text x="212" y="274" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#646970">Server URL</text>
  <text x="212" y="292" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#3c434a">https://mail.example.com</text>
  <!-- Username -->
  <text x="212" y="318" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#646970">Username</text>
  <text x="212" y="336" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#3c434a">admin@example.com</text>
  <!-- Actions -->
  <rect x="212" y="354" width="60" height="28" rx="4" fill="#f0f0f1" stroke="#c3c4c7" stroke-width="1"/>
  <text x="242" y="373" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#3c434a" text-anchor="middle">Edit</text>

  <!-- Card 2: Transactional -->
  <rect x="546" y="208" width="330" height="170" rx="4" fill="#ffffff" stroke="#dcdcde" stroke-width="1"/>
  <rect x="546" y="208" width="330" height="48" rx="4" fill="#ffffff" stroke="#dcdcde" stroke-width="1"/>
  <circle cx="566" cy="232" r="6" fill="#00a32a"/>
  <text x="580" y="237" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="14" font-weight="700" fill="#1d2327">Transactional</text>
  <!-- Server URL -->
  <text x="562" y="274" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#646970">Server URL</text>
  <text x="562" y="292" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#3c434a">https://smtp.fastmail.com</text>
  <!-- Username -->
  <text x="562" y="318" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#646970">Username</text>
  <text x="562" y="336" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#3c434a">noreply@example.com</text>
  <!-- Actions -->
  <rect x="562" y="354" width="60" height="28" rx="4" fill="#f0f0f1" stroke="#c3c4c7" stroke-width="1"/>
  <text x="592" y="373" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#3c434a" text-anchor="middle">Edit</text>
  <rect x="630" y="354" width="60" height="28" rx="4" fill="#fef2f2" stroke="#f5c6c7" stroke-width="1"/>
  <text x="660" y="373" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#d63638" text-anchor="middle">Delete</text>

  <!-- Add Account button -->
  <rect x="196" y="400" width="140" height="36" rx="4" fill="#6366f1"/>
  <text x="266" y="423" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">+ Add account</text>
</svg>
