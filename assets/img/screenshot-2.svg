<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <rect width="1200" height="750" fill="#f0f0f1"/>
  <rect width="1200" height="32" fill="#1d2327"/>
  <rect x="0" y="32" width="160" height="718" fill="#1d2327"/>
  <rect x="0" y="164" width="3" height="32" fill="#6366f1"/>
  <text x="16" y="185" font-size="13" fill="#72aee6" font-weight="600">Postwave JMAP</text>
  <text x="16" y="56" font-size="13" fill="#f0f0f1" font-weight="600">Dashboard</text>
  <text x="16" y="92" font-size="13" fill="#a7aaad">Posts</text>
  <text x="16" y="120" font-size="13" fill="#a7aaad">Plugins</text>

  <!-- Header -->
  <rect x="160" y="32" width="1040" height="52" fill="white"/>
  <rect x="160" y="84" width="1040" height="1" fill="#dcdcde"/>
  <rect x="180" y="44" width="28" height="28" rx="6" fill="#6366f1"/>
  <rect x="186" y="56" width="16" height="8" rx="2" fill="white" opacity="0.9"/>
  <path d="M186 58 L194 61 L202 58" stroke="#818cf8" stroke-width="1.2" fill="none"/>
  <path d="M188 52 Q192 47 196 52" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <text x="216" y="58" font-size="15" font-weight="700" fill="#1d2327">Postwave JMAP</text>
  <text x="216" y="73" font-size="11" fill="#646970">JMAP Mail for WordPress</text>
  <rect x="1090" y="50" width="82" height="22" rx="11" fill="#edfaef" stroke="#b8e6c1" stroke-width="1"/>
  <circle cx="1103" cy="61" r="4" fill="#00a32a"/>
  <text x="1112" y="65" font-size="12" font-weight="600" fill="#00a32a">Active</text>

  <!-- Nav -->
  <rect x="160" y="85" width="1040" height="44" fill="white"/>
  <rect x="160" y="129" width="1040" height="1" fill="#dcdcde"/>
  <text x="188" y="113" font-size="13" fill="#646970">General</text>
  <text x="248" y="113" font-size="13" font-weight="600" fill="#6366f1">Connection</text>
  <rect x="242" y="127" width="74" height="2" fill="#6366f1"/>
  <text x="334" y="113" font-size="13" fill="#646970">Mail Log</text>
  <text x="1140" y="113" font-size="11" fill="#a7aaad">v1.0.0</text>

  <!-- Page title -->
  <text x="192" y="164" font-size="18" font-weight="700" fill="#1d2327">Connection</text>
  <text x="192" y="184" font-size="13" fill="#646970">JMAP server credentials and connection testing.</text>

  <!-- Stats -->
  <g transform="translate(192, 200)">
    <rect width="155" height="68" rx="8" fill="white" stroke="#dcdcde" stroke-width="1"/>
    <text x="16" y="36" font-size="24" font-weight="700" fill="#6366f1">3</text>
    <text x="16" y="54" font-size="10" font-weight="600" fill="#646970" letter-spacing="0.4">SENT TODAY</text>
    <rect x="165" width="155" height="68" rx="8" fill="white" stroke="#dcdcde" stroke-width="1"/>
    <text x="181" y="36" font-size="24" font-weight="700" fill="#d63638">0</text>
    <text x="181" y="54" font-size="10" font-weight="600" fill="#646970" letter-spacing="0.4">FAILED TODAY</text>
    <rect x="330" width="155" height="68" rx="8" fill="white" stroke="#dcdcde" stroke-width="1"/>
    <text x="346" y="36" font-size="24" font-weight="700" fill="#6366f1">18</text>
    <text x="346" y="54" font-size="10" font-weight="600" fill="#646970" letter-spacing="0.4">SENT THIS WEEK</text>
    <rect x="495" width="155" height="68" rx="8" fill="white" stroke="#dcdcde" stroke-width="1"/>
    <text x="511" y="36" font-size="24" font-weight="700" fill="#d63638">1</text>
    <text x="511" y="54" font-size="10" font-weight="600" fill="#646970" letter-spacing="0.4">FAILED THIS WEEK</text>
    <rect x="660" width="155" height="68" rx="8" fill="white" stroke="#dcdcde" stroke-width="1"/>
    <text x="676" y="36" font-size="24" font-weight="700" fill="#3c434a">47</text>
    <text x="676" y="54" font-size="10" font-weight="600" fill="#646970" letter-spacing="0.4">TOTAL LOGGED</text>
  </g>

  <!-- Server config panel -->
  <rect x="192" y="290" width="820" height="258" rx="8" fill="white" stroke="#dcdcde" stroke-width="1"/>
  <text x="216" y="320" font-size="14" font-weight="700" fill="#2c3338">Server Configuration</text>
  <text x="216" y="338" font-size="12.5" fill="#646970">Your JMAP server URL, username, and password.</text>
  <!-- Server URL -->
  <text x="216" y="370" font-size="11" font-weight="600" fill="#3c434a" letter-spacing="0.5">JMAP SERVER URL</text>
  <rect x="216" y="376" width="780" height="38" rx="4" fill="white" stroke="#6366f1" stroke-width="2"/>
  <text x="230" y="400" font-size="13" fill="#1d2327">https://mail.tahhan.nl</text>
  <text x="216" y="426" font-size="11.5" fill="#a7aaad">Session is auto-discovered at /.well-known/jmap</text>
  <!-- Username / Password -->
  <text x="216" y="450" font-size="11" font-weight="600" fill="#3c434a" letter-spacing="0.5">USERNAME</text>
  <text x="596" y="450" font-size="11" font-weight="600" fill="#3c434a" letter-spacing="0.5">PASSWORD</text>
  <rect x="216" y="456" width="360" height="38" rx="4" fill="white" stroke="#c3c4c7" stroke-width="1"/>
  <text x="230" y="480" font-size="13" fill="#1d2327">info@tahhan.nl</text>
  <rect x="596" y="456" width="400" height="38" rx="4" fill="white" stroke="#c3c4c7" stroke-width="1"/>
  <text x="610" y="480" font-size="13" fill="#1d2327">••••••••••••</text>
  <text x="620" y="506" font-size="11.5" fill="#00a32a" font-weight="500">✓ Password saved — leave blank to keep current</text>
  <!-- Footer -->
  <rect x="192" y="504" width="820" height="44" rx="0 0 8 8" fill="#f9fafb"/>
  <rect x="192" y="504" width="820" height="1" fill="#f0f0f1"/>
  <rect x="216" y="516" width="136" height="32" rx="4" fill="#6366f1"/>
  <text x="240" y="537" font-size="13" font-weight="500" fill="white">Save credentials</text>

  <!-- Test connection panel -->
  <rect x="192" y="562" width="820" height="152" rx="8" fill="#f9fafb" stroke="#dcdcde" stroke-width="1"/>
  <text x="216" y="592" font-size="14" font-weight="700" fill="#2c3338">Test Connection</text>
  <text x="216" y="610" font-size="12.5" fill="#646970">Save your credentials first, then verify the server responds correctly.</text>
  <!-- Test buttons -->
  <rect x="216" y="624" width="140" height="36" rx="4" fill="white" stroke="#6366f1" stroke-width="1"/>
  <text x="250" y="647" font-size="13" fill="#6366f1">→ Test connection</text>
  <rect x="370" y="624" width="155" height="36" rx="4" fill="white" stroke="#6366f1" stroke-width="1"/>
  <text x="394" y="647" font-size="13" fill="#6366f1">✉ Send test email</text>
</svg>
