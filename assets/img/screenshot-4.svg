<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <rect width="1200" height="750" fill="#f0f0f1"/>
  <rect width="1200" height="32" fill="#1d2327"/>
  <rect x="0" y="32" width="160" height="718" fill="#1d2327"/>
  <text x="16" y="185" font-size="13" fill="#72aee6" font-weight="600">Postwave JMAP</text>

  <!-- Header -->
  <rect x="160" y="32" width="1040" height="52" fill="white"/>
  <rect x="160" y="84" width="1040" height="1" fill="#dcdcde"/>
  <text x="216" y="64" font-size="15" font-weight="700" fill="#1d2327">Postwave JMAP</text>

  <!-- Connection test in progress -->
  <rect x="192" y="290" width="820" height="280" rx="8" fill="#f9fafb" stroke="#dcdcde" stroke-width="1"/>
  <text x="216" y="320" font-size="14" font-weight="700" fill="#2c3338">Test Connection</text>
  <text x="216" y="338" font-size="12.5" fill="#646970">Testing https://mail.tahhan.nl …</text>

  <!-- Test buttons disabled -->
  <rect x="216" y="352" width="140" height="36" rx="4" fill="white" stroke="#dcdcde" stroke-width="1" opacity="0.5"/>
  <text x="250" y="375" font-size="13" fill="#a7aaad">→ Test connection</text>
  <rect x="370" y="352" width="155" height="36" rx="4" fill="white" stroke="#dcdcde" stroke-width="1" opacity="0.5"/>
  <text x="394" y="375" font-size="13" fill="#a7aaad">✉ Send test email</text>

  <!-- Steps -->
  <!-- Step 1 done -->
  <rect x="216" y="402" width="780" height="38" rx="4" fill="white" stroke="#dcdcde" stroke-width="1"/>
  <circle cx="234" cy="421" r="11" fill="#edfaef"/>
  <text x="228" y="426" font-size="12" font-weight="700" fill="#00a32a">✓</text>
  <text x="254" y="425" font-size="13" fill="#1d2327">Discovering JMAP session…</text>
  <!-- Step 2 loading -->
  <rect x="216" y="448" width="780" height="38" rx="4" fill="white" stroke="#dcdcde" stroke-width="1"/>
  <circle cx="234" cy="467" r="11" fill="#eef2ff"/>
  <text x="228" y="471" font-size="12" fill="#6366f1">◆</text>
  <text x="254" y="471" font-size="13" fill="#1d2327">Resolving sender identity…</text>
  <!-- Step 3 pending -->
  <rect x="216" y="494" width="780" height="38" rx="4" fill="white" stroke="#dcdcde" stroke-width="1" opacity="0.4"/>
  <circle cx="234" cy="513" r="11" fill="#f0f0f1"/>
  <text x="230" y="517" font-size="12" fill="#a7aaad">○</text>
  <text x="254" y="517" font-size="13" fill="#a7aaad">Verifying capabilities…</text>

  <!-- Success result -->
  <rect x="216" y="546" width="780" height="0" rx="4" fill="#edfaef"/>

  <!-- Centered wizard card on top (main content of screenshot) -->
  <rect x="350" y="100" width="500" height="580" rx="12" fill="white" stroke="#dcdcde" stroke-width="1.5" filter="drop-shadow(0 4px 16px rgba(0,0,0,.10))"/>
  <!-- Hero -->
  <rect x="440" y="130" width="60" height="60" rx="14" fill="#6366f1"/>
  <rect x="450" y="158" width="40" height="20" rx="4" fill="white" opacity="0.9"/>
  <path d="M450 163 L470 168 L490 163" stroke="#818cf8" stroke-width="2" fill="none"/>
  <path d="M455 148 Q470 136 485 148" stroke="white" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M460 138 Q470 128 480 138" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.6"/>
  <text x="600" y="152" text-anchor="middle" font-size="22" font-weight="700" fill="#1d2327">Welcome to Postwave</text>
  <text x="600" y="175" text-anchor="middle" font-size="13" fill="#646970">Modern JMAP mail for WordPress</text>
  <!-- Features -->
  <rect x="374" y="192" width="452" height="52" rx="4" fill="#f9fafb" stroke="#dcdcde" stroke-width="1"/>
  <rect x="386" y="204" width="28" height="28" rx="6" fill="#eef2ff"/>
  <text x="397" y="222" font-size="14">⚡</text>
  <text x="424" y="213" font-size="13" font-weight="600" fill="#2c3338">JMAP Protocol</text>
  <text x="424" y="230" font-size="12" fill="#646970">RFC 8620/8621 — works with Stalwart, Fastmail &amp; more</text>

  <rect x="374" y="252" width="452" height="52" rx="4" fill="#f9fafb" stroke="#dcdcde" stroke-width="1"/>
  <rect x="386" y="264" width="28" height="28" rx="6" fill="#eef2ff"/>
  <text x="397" y="282" font-size="14">🔒</text>
  <text x="424" y="273" font-size="13" font-weight="600" fill="#2c3338">Secure delivery</text>
  <text x="424" y="290" font-size="12" fill="#646970">Auth via JMAP credentials, no plaintext secrets</text>

  <rect x="374" y="312" width="452" height="52" rx="4" fill="#f9fafb" stroke="#dcdcde" stroke-width="1"/>
  <rect x="386" y="324" width="28" height="28" rx="6" fill="#eef2ff"/>
  <text x="397" y="342" font-size="14">📋</text>
  <text x="424" y="333" font-size="13" font-weight="600" fill="#2c3338">Mail log</text>
  <text x="424" y="350" font-size="12" fill="#646970">Every send attempt tracked — subject, recipient, status</text>

  <!-- Start button -->
  <rect x="430" y="384" width="340" height="44" rx="6" fill="#6366f1"/>
  <text x="600" y="411" text-anchor="middle" font-size="14" font-weight="600" fill="white">Start setup →</text>
  <text x="600" y="446" text-anchor="middle" font-size="12" fill="#a7aaad">Skip — configure manually later</text>

  <!-- Progress -->
  <g transform="translate(374, 470)">
    <rect width="452" height="60" rx="6" fill="#f9fafb"/>
    <!-- Steps -->
    <circle cx="100" cy="30" r="14" fill="#6366f1"/>
    <text x="95" y="35" font-size="12" font-weight="600" fill="white">1</text>
    <text x="86" y="52" font-size="10" fill="#6366f1" font-weight="600">Server</text>
    <rect x="114" y="28" width="90" height="2" fill="#dcdcde"/>
    <circle cx="226" cy="30" r="14" fill="#dcdcde"/>
    <text x="221" y="35" font-size="12" fill="#646970">2</text>
    <text x="213" y="52" font-size="10" fill="#646970">Sender</text>
    <rect x="240" y="28" width="90" height="2" fill="#dcdcde"/>
    <circle cx="352" cy="30" r="14" fill="#dcdcde"/>
    <text x="346" y="35" font-size="12" fill="#646970">3</text>
    <text x="336" y="52" font-size="10" fill="#646970">Activate</text>
  </g>
</svg>
